name: Proton ARM64EC 构建（Winlator 专用版）

on:
  workflow_dispatch:
    inputs:
      proton_branch:
        description: 'Proton 分支'
        required: false
        default: 'proton_10.0'
        type: choice
        options:
          - proton_10.0
          - proton_9.0
          - experimental_10.0
          - bleeding-edge

env:
  # Winlator 专用路径配置
  WINLATOR_TMP_DIR: /data/data/com.winlator/files/imagefs/usr/tmp
  WINLATOR_RUNTIME_PATH: /data/data/com.winlator/files/imagefs/usr
  WINLATOR_INSTALL_PATH: /data/data/com.winlator/files/imagefs/usr/opt/wine
  
  # llvm-mingw 版本 - 使用验证过的版本
  LLVMMINGW_DATE: 20250920
  LLVMMINGW_NAME: llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64
  # NDK 版本
  NDK_VERSION: 27.3.13750724
  # Termuxfs 版本
  TERMUXFS_VERSION: build-20260218

permissions:
  contents: write

jobs:
  build-proton-arm64ec-winlator:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      # ------------------------------------------------------------
      # 1. 检查代码库并清理磁盘空间
      # ------------------------------------------------------------
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 清理磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      # ------------------------------------------------------------
      # 2. 安装基础构建依赖
      # ------------------------------------------------------------
      - name: 安装构建依赖
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            git \
            wget \
            curl \
            unzip \
            flex \
            bison \
            gettext \
            autoconf \
            automake \
            libtool \
            pkg-config \
            mingw-w64 \
            gcc-multilib \
            g++-multilib \
            libfreetype6-dev \
            libfreetype6-dev:i386 \
            libpng-dev \
            libpng-dev:i386 \
            zlib1g-dev \
            zlib1g-dev:i386 \
            zstd \
            xz-utils \
            python3-zstandard \
            patch

      # ------------------------------------------------------------
      # 3. 获取 Proton 源码
      # ------------------------------------------------------------
      - name: 克隆 Wine 源码
        run: |
          rm -rf wine-source
          PROTON_BRANCH="${{ github.event.inputs.proton_branch || 'proton_10.0' }}"
          
          # 克隆 GameNative/proton-wine
          git clone --depth=1 --branch "$PROTON_BRANCH" \
            https://github.com/GameNative/proton-wine wine-source \
            || {
              echo "GameNative 仓库克隆失败，回退到 ValveSoftware/wine"
              git clone --depth=1 --branch "$PROTON_BRANCH" \
                https://github.com/ValveSoftware/wine wine-source \
                || {
                  git clone --depth=1 https://github.com/ValveSoftware/wine wine-source
                  git -C wine-source fetch --depth=1 origin "$PROTON_BRANCH"
                  git -C wine-source checkout FETCH_HEAD
                }
            }
          
          echo "Proton 分支: $PROTON_BRANCH"
          git -C wine-source rev-parse HEAD

      # ------------------------------------------------------------
      # 4. 应用 Android 构建脚本和所有补丁
      # ------------------------------------------------------------
      - name: 应用 Android 构建脚本和补丁
        run: |
          cd wine-source
          
          # 复制 Android 补丁目录
          if [ -d "../proton-wine-proton_10.0/android" ]; then
            cp -r ../proton-wine-proton_10.0/android .
            echo "Android 补丁目录已复制"
          fi
          
          # 复制构建脚本
          if [ -d "../proton-wine-proton_10.0/build-scripts" ]; then
            cp -r ../proton-wine-proton_10.0/build-scripts .
            echo "构建脚本已复制"
          fi
          
          # 复制 GE Second Pass 补丁（包含 test-bylaws）
          if [ -d "../proton-arm64-nightlies-main/ge-second-pass" ]; then
            cp -r ../proton-arm64-nightlies-main/ge-second-pass .
            echo "GE Second Pass 补丁已复制"
          fi
          
          # 复制必要脚本
          if [ -d "../proton-arm64-nightlies-main/scripts" ]; then
            cp -r ../proton-arm64-nightlies-main/scripts .
            echo "构建辅助脚本已复制"
          fi
          
          # 【关键修复】确保 test-bylaws 补丁存在
          echo "=== 检查并复制 test-bylaws 补丁 ==="
          
          # 创建 test-bylaws 目录（如果不存在）
          mkdir -p android/patches/test-bylaws
          
          # 从 ge-second-pass/test-bylaws 复制所有 test-bylaws 补丁
          if [ -d "ge-second-pass/test-bylaws" ]; then
            echo "从 ge-second-pass/test-bylaws 复制补丁..."
            cp ge-second-pass/test-bylaws/*.patch android/patches/test-bylaws/ 2>/dev/null || echo "ge-second-pass/test-bylaws 为空"
            cp ge-second-pass/test-bylaws/*.patch android/patches/ 2>/dev/null || true
          fi
          
          # 如果 ge-second-pass 没有 test-bylaws，从 proton-wine 的 android/patches/test-bylaws 复制
          if [ ! -d "ge-second-pass/test-bylaws" ] && [ -d "../proton-wine-proton_10.0/android/patches/test-bylaws" ]; then
            echo "从 proton-wine/android/patches/test-bylaws 复制补丁..."
            cp ../proton-wine-proton_10.0/android/patches/test-bylaws/*.patch android/patches/test-bylaws/ 2>/dev/null || echo "proton-wine test-bylaws 为空"
          fi
          
          # 验证 test-bylaws 补丁是否存在
          echo "=== 验证 test-bylaws 补丁 ==="
          ls -la android/patches/test-bylaws/ || echo "test-bylaws 目录为空或不存在"
          
          # 修复行尾符
          find android/patches -type f -name "*.patch" -exec sed -i 's/\r$//' {} + 2>/dev/null || true

      # ------------------------------------------------------------
      # 5. 下载 llvm-mingw 交叉编译工具链
      # ------------------------------------------------------------
      - name: 下载 llvm-mingw 工具链
        run: |
          LLVM_DIR="$HOME/toolchains/${{ env.LLVMMINGW_NAME }}"
          if [ ! -f "$LLVM_DIR/bin/llvm-dlltool" ]; then
            echo "下载 llvm-mingw..."
            mkdir -p "$HOME/toolchains"
            cd "$HOME/toolchains"
            wget -q https://github.com/bylaws/llvm-mingw/releases/download/${{ env.LLVMMINGW_DATE }}/${{ env.LLVMMINGW_NAME }}.tar.xz
            tar -xf ${{ env.LLVMMINGW_NAME }}.tar.xz
            rm -f ${{ env.LLVMMINGW_NAME }}.tar.xz
          else
            echo "llvm-mingw 已安装，跳过下载"
          fi
          echo "$HOME/toolchains/${{ env.LLVMMINGW_NAME }}/bin" >> $GITHUB_PATH

      # ------------------------------------------------------------
      # 6. 设置 Android NDK
      # ------------------------------------------------------------
      - name: 设置 Android NDK
        run: |
          NDK_DIR="$HOME/Android/Sdk/ndk/${{ env.NDK_VERSION }}"
          if [ ! -d "$NDK_DIR" ]; then
            echo "下载 Android NDK..."
            mkdir -p "$HOME/Android/Sdk/ndk"
            cd "$HOME/Android/Sdk/ndk"
            wget -q https://dl.google.com/android/repository/android-ndk-r27d-linux.zip
            unzip -q android-ndk-r27d-linux.zip
            mv android-ndk-r27d ${{ env.NDK_VERSION }}
            rm -f android-ndk-r27d-linux.zip
          else
            echo "NDK 已安装，跳过下载"
          fi

      # ------------------------------------------------------------
      # 7. 下载 Termux 文件系统
      # ------------------------------------------------------------
      - name: 下载 Termuxfs
        run: |
          TERMUX_DIR="$HOME/termuxfs/aarch64"
          if [ ! -d "$TERMUX_DIR/data/data/com.termux/files/usr/include" ]; then
            echo "下载 Termuxfs..."
            mkdir -p "$TERMUX_DIR"
            cd "$TERMUX_DIR"
            wget -q "https://github.com/GameNative/termux-on-gha/releases/download/${{ env.TERMUXFS_VERSION }}/termuxfs-aarch64.tar"
            tar -xf termuxfs-aarch64.tar
            rm -f termuxfs-aarch64.tar
          else
            echo "Termuxfs 已存在，跳过下载"
          fi

      # ------------------------------------------------------------
      # 8. 运行 autogen.sh
      # ------------------------------------------------------------
      - name: 运行 autogen.sh
        run: |
          cd wine-source
          bash autogen.sh

      # ------------------------------------------------------------
      # 9. 缓存 wine-tools
      # ------------------------------------------------------------
      - name: 缓存 wine-tools
        id: cache-wine-tools
        uses: actions/cache@v4
        with:
          path: wine-source/wine-tools
          key: wine-tools-${{ hashFiles('wine-source/configure.ac', 'wine-source/configure') }}
          restore-keys: wine-tools-

      # ------------------------------------------------------------
      # 10. 构建 wine-tools
      # ------------------------------------------------------------
      - name: 构建 wine-tools
        if: steps.cache-wine-tools.outputs.cache-hit != 'true'
        run: |
          cd wine-source
          mkdir -p wine-tools
          cd wine-tools
          ../configure --without-x --without-gstreamer --without-vulkan --without-wayland --without-xinput2
          make -j$(nproc) __tooldeps__ nls/all
          echo "wine-tools 构建完成"

      # ------------------------------------------------------------
      # 11. 配置 Winlator 专用路径（跳过 android_sysvshm）
      # ------------------------------------------------------------
      - name: 配置 Winlator 专用路径
        run: |
          cd wine-source
          
          
          
          # 【关键】跳过 android_sysvshm 构建（避免 _r_debug 冲突）
          echo "=== 跳过 android_sysvshm 构建（避免 _r_debug 冲突）==="
          sed -i 's|bash build-scripts/build-step-arm64ec.sh --build-sysvshm|# 跳过 android_sysvshm 构建 - 避免 _r_debug 冲突|g' build-scripts/build-step-arm64ec.sh
          
          
          
          echo "=== 路径修改完成 ==="
          grep -E "^export (install_dir|RUNTIME_PATH|LDFLAGS|OUTPUT_DIR)" build-scripts/build-step-arm64ec.sh | head -5

      # ------------------------------------------------------------
      # 12. 验证所有必需的补丁文件存在
      # ------------------------------------------------------------
      - name: 验证补丁文件
        run: |
          cd wine-source
          echo "=== 验证 android/patches 目录结构 ==="
          ls -la android/patches/
          echo ""
          echo "=== 验证 test-bylaws 补丁 ==="
          ls -la android/patches/test-bylaws/ 2>/dev/null || echo "test-bylaws 目录不存在或为空"
          echo ""
          echo "=== 检查关键补丁文件是否存在 ==="
          for patch in \
            "test-bylaws/dlls_ntdll_signal_arm64ec_c.patch" \
            "test-bylaws/dlls_wow64_syscall_c.patch" \
            "test-bylaws/dlls_ntdll_unwind_h.patch" \
            "test-bylaws/include_winnt_h.patch"; do
            if [ -f "android/patches/$patch" ]; then
              echo "✓ android/patches/$patch 存在"
            else
              echo "✗ android/patches/$patch 不存在!"
            fi
          done

      # ------------------------------------------------------------
      # 13. 配置构建
      # ------------------------------------------------------------
      - name: 配置 ARM64EC 构建
        id: configure_build
        continue-on-error: true
        run: |
          cd wine-source
          set -o pipefail
          
          # 【关键】强制设置 Winlator 专用 LDFLAGS
          echo "=== 强制设置 Winlator 专用 LDFLAGS ==="
          export LDFLAGS="-s -Wl,--dynamic-linker=/data/data/com.winlator/files/imagefs/usr/lib/ld-linux-aarch64.so.1 -Wl,-rpath=/data/data/com.winlator/files/imagefs/usr/lib"
          echo "LDFLAGS=$LDFLAGS"
          
          bash -e build-scripts/build-step-arm64ec.sh --configure 2>&1 | tee configure-run.log
          test -f Makefile

      - name: 显示配置错误日志
        if: steps.configure_build.outcome == 'failure'
        run: |
          cd wine-source
          echo "配置失败，显示日志:"
          if [ -f ./configure-run.log ]; then
            tail -n 250 ./configure-run.log || true
          fi
          find . -maxdepth 2 \( -name config.log -o -name configure.log \) -print || true
          if [ -f ./config.log ]; then
            tail -n 250 ./config.log || true
          fi
          exit 1

      # ------------------------------------------------------------
      # 14. 构建 Proton
      # ------------------------------------------------------------
      - name: 构建 Proton ARM64EC
        run: |
          cd wine-source
          
          # 【关键】强制设置 Winlator 专用 LDFLAGS
          echo "=== 强制设置 Winlator 专用 LDFLAGS ==="
          export LDFLAGS="-s -Wl,--dynamic-linker=/data/data/com.winlator/files/imagefs/usr/lib/ld-linux-aarch64.so.1 -Wl,-rpath=/data/data/com.winlator/files/imagefs/usr/lib"
          echo "LDFLAGS=$LDFLAGS"
          
          bash build-scripts/build-step-arm64ec.sh --build

      # ------------------------------------------------------------
      # 15. 安装 Proton
      # ------------------------------------------------------------
      - name: 安装 Proton
        run: |
          sudo mkdir -p "${{ env.WINLATOR_INSTALL_PATH }}"
          sudo chmod -R 777 /data/data
          
          cd wine-source
          bash build-scripts/build-step-arm64ec.sh --install
          
          # 确认 OUTPUT_DIR 存在
          echo "=== 检查编译输出目录 ==="
          echo "HOME=$HOME"
          echo "OUTPUT_DIR=$HOME/compiled-files-winlator"
          ls -la "$HOME/compiled-files-winlator/" 2>/dev/null || echo "compiled-files-winlator 目录不存在"
          
          # 如果 winlator 目录不存在，检查 aarch64 目录
          if [ ! -d "$HOME/compiled-files-winlator/bin" ]; then
            echo "尝试检查 compiled-files-aarch64..."
            ls -la "$HOME/compiled-files-aarch64/" 2>/dev/null || echo "compiled-files-aarch64 目录也不存在"
          fi
          
          echo "=== wine 二进制文件类型 ==="
          file "$HOME/compiled-files-winlator/bin/wine" 2>/dev/null || \
          file "$HOME/compiled-files-aarch64/bin/wine" 2>/dev/null || \
          echo "找不到 wine 二进制文件"
          
          # 验证动态链接器
          echo "=== 验证 wine 动态链接器 ==="
          readelf -l "$HOME/compiled-files-winlator/bin/wine" 2>/dev/null | grep -i interpreter || \
          readelf -l "$HOME/compiled-files-aarch64/bin/wine" 2>/dev/null | grep -i interpreter || true

      # ------------------------------------------------------------
      # 16. 打包 wine 内容
      # ------------------------------------------------------------
      - name: 打包 wine 内容
        run: |
          GIT_HASH=$(git -C wine-source rev-parse --short HEAD)
          GIT_DATE=$(git -C wine-source log -1 --format='%cd' --date=format:'%Y%m%d')
          PROTON_BRANCH="${{ github.event.inputs.proton_branch || 'proton_10.0' }}"
          VERSION="proton-${PROTON_BRANCH}-${GIT_DATE}-${GIT_HASH}-winlator-arm64ec"
          
          mkdir -p "$GITHUB_WORKSPACE/output"
          
          # 确定实际的文件位置
          if [ -d "$HOME/compiled-files-winlator/bin" ]; then
            PACK_DIR="$HOME/compiled-files-winlator"
          elif [ -d "$HOME/compiled-files-aarch64/bin" ]; then
            PACK_DIR="$HOME/compiled-files-aarch64"
          else
            echo "错误: 找不到编译输出目录"
            exit 1
          fi
          
          echo "打包目录: $PACK_DIR"
          ls -la "$PACK_DIR/"
          
          # 直接打包 wine 内容（bin lib share）
          cd "$PACK_DIR"
          tar cJf "$GITHUB_WORKSPACE/output/proton-${VERSION}.tar.xz" \
            bin lib share
          
          cd "$GITHUB_WORKSPACE"
          sha256sum "output/proton-${VERSION}.tar.xz" > "output/proton-${VERSION}.tar.xz.sha256"
          
          ls -lh output/

      # ------------------------------------------------------------
      # 17. 上传构建产物
      # ------------------------------------------------------------
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Proton-${{ github.event.inputs.proton_branch || 'proton_10.0' }}-Winlator-ARM64EC
          path: |
            output/*
          retention-days: 30

      # ------------------------------------------------------------
      # 18. 发布到 GitHub Release
      # ------------------------------------------------------------
      - name: 发布到 GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: proton-${{ github.event.inputs.proton_branch || 'proton_10.0' }}-winlator-arm64ec
          name: Proton ${{ github.event.inputs.proton_branch || 'proton_10.0' }} (Winlator ARM64EC)
          body: |
            # Proton ${{ github.event.inputs.proton_branch || 'proton_10.0' }} - Winlator ARM64EC 构建

            ## 构建信息
            - **Proton 分支**: ${{ github.event.inputs.proton_branch || 'proton_10.0' }}
            - **目标架构**: ARM64EC (arm64ec, aarch64, i386)
            - **目标平台**: Winlator (Android)
            - **临时目录**: `${{ env.WINLATOR_TMP_DIR }}`
            - **运行时路径**: `${{ env.WINLATOR_RUNTIME_PATH }}`
            - **构建时间**: ${{ github.run_date }}
            - **提交哈希**: ${{ github.sha }}

            ## 路径配置
            - **动态链接器**: `/data/data/com.winlator/files/imagefs/usr/lib/ld-linux-aarch64.so.1`
            - **RPATH**: `/data/data/com.winlator/files/imagefs/usr/lib`

            ## 包含组件
            - ✓ ARM64EC 原生 Proton 可执行文件
            - ✓ 支持运行 32/64 位 Windows 应用程序
            - ✓ Winlator 专用路径配置
            - ⚠️ 不包含 prefixPack，需要单独配置

            ## 安装说明
            1. 解压 tar.xz 文件
            2. 将内容放置在 Winlator 的合适位置
            3. 确保路径配置与 Winlator 环境匹配
            4. 需要单独配置 prefix（Wine 前缀）
          files: |
            output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
