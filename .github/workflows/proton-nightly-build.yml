name: Proton Bleeding-Edge Build

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner to use'
        required: false
        default: 'ubuntu-24.04'
        type: choice
        options:
          - ubuntu-24.04
          - self-hosted
      target_app_id:
        description: 'Target Android app id for hardcoded wine paths'
        required: false
        default: 'app.gamenative'
        type: choice
        options:
          - app.gamenative
          - com.winlator.cmod
      wine_ref:
        description: 'Valve wine ref (branch/tag/commit)'
        required: false
        default: 'bleeding-edge'
        type: string
      gamenative_ref:
        description: 'GameNative proton-wine ref (branch/tag/commit)'
        required: false
        default: 'proton_10.0'
        type: string
      disable_gamenative_patches:
        description: 'Disable all GameNative Android patch application and local patch/fix injections'
        required: false
        default: false
        type: boolean
      force_build:
        description: 'Force a build even if upstream HEAD is unchanged'
        required: false
        default: false
        type: boolean
      extra_winebus_patches:
        description: 'Download and apply optional GE winebus controller patches'
        required: false
        default: false
        type: boolean
      ge_perf_second_pass:
        description: 'Apply optional GE second-pass performance patch(es)'
        required: false
        default: false
        type: boolean
      dinput_android_compat_workaround:
        description: 'Apply Android-only DirectInput raw-input compatibility workaround patch'
        required: false
        default: false
        type: boolean
      input_poll_debug:
        description: 'Apply input polling and DirectInput instance debug instrumentation patches'
        required: false
        default: false
        type: boolean

jobs:
  prepare:
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-24.04' }}
    outputs:
      resolved_hash: ${{ steps.upstream_check.outputs.resolved_hash }}
      resolved_short_hash: ${{ steps.upstream_check.outputs.resolved_short_hash }}
      skip_build: ${{ steps.upstream_check.outputs.skip_build }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Check upstream bleeding-edge head
        id: upstream_check
        run: |
          WINE_REF="${{ github.event.inputs.wine_ref || 'bleeding-edge' }}"
          FORCE_BUILD="${{ inputs.force_build && 'true' || 'false' }}"
          PREV_GIT_HASH="$(python3 -c 'import json; d=json.load(open("latest.json")); print(d.get("gitHash",""))')"

          if printf '%s' "$WINE_REF" | grep -Eq '^[0-9a-fA-F]{7,40}$'; then
            REMOTE_FULL_HASH="$WINE_REF"
          else
            REMOTE_FULL_HASH="$(git ls-remote https://github.com/ValveSoftware/wine "$WINE_REF" "refs/heads/$WINE_REF" "refs/tags/$WINE_REF" | awk 'NR==1 {print $1}')"
          fi

          if [ -z "$REMOTE_FULL_HASH" ]; then
            echo "ERROR: could not resolve upstream ref $WINE_REF"
            exit 1
          fi

          REMOTE_SHORT_HASH="$(printf '%s' "$REMOTE_FULL_HASH" | cut -c1-7)"
          SKIP_BUILD=false
          if [ "$FORCE_BUILD" != 'true' ] && [ "$REMOTE_SHORT_HASH" = "$PREV_GIT_HASH" ]; then
            SKIP_BUILD=true
          fi

          echo "resolved_hash=$REMOTE_FULL_HASH" >> "$GITHUB_OUTPUT"
          echo "resolved_short_hash=$REMOTE_SHORT_HASH" >> "$GITHUB_OUTPUT"
          echo "skip_build=$SKIP_BUILD" >> "$GITHUB_OUTPUT"
          echo "Previous gitHash: $PREV_GIT_HASH"
          echo "Remote   gitHash: $REMOTE_SHORT_HASH"
          echo "force_build=$FORCE_BUILD"
          echo "skip_build=$SKIP_BUILD"

      - name: Stop early when upstream is unchanged
        if: steps.upstream_check.outputs.skip_build == 'true'
        run: |
          echo "Skipping build: upstream bleeding-edge HEAD matches latest.json"

  build:
    needs: prepare
    if: needs.prepare.outputs.skip_build != 'true'
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-24.04' }}
    timeout-minutes: 360
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_id: arm64ec
            termux_arch: aarch64
            build_script: build-step-arm64ec.sh
            output_dir: compiled-files-aarch64
            prefix_pack: prefixPack-arm64ec.txz
            profile_version: 10.0.99-arm64ec
            display_arch: ARM64EC
            sysvshm: true

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Set up build environment
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            wget \
            curl \
            unzip \
            flex \
            bison \
            gettext \
            autoconf \
            automake \
            libtool \
            pkg-config \
            mingw-w64 \
            gcc-multilib \
            g++-multilib \
            libfreetype6-dev \
            libfreetype6-dev:i386 \
            libpng-dev \
            libpng-dev:i386 \
            zlib1g-dev \
            zlib1g-dev:i386 \
            zstd \
            xz-utils \
            python3-zstandard \
            patch

      - name: Clone Wine source
        run: |
          rm -rf wine-source
          WINE_REF="${{ github.event.inputs.wine_ref || 'bleeding-edge' }}"
          git clone --depth=1 --branch "$WINE_REF" \
            https://github.com/ValveSoftware/wine wine-source \
          || {
            git clone --depth=1 https://github.com/ValveSoftware/wine wine-source
            git -C wine-source fetch --depth=1 origin "$WINE_REF"
            git -C wine-source checkout FETCH_HEAD
          }
          echo "Wine ref: $WINE_REF"
          git -C wine-source rev-parse HEAD

      - name: Clone GameNative patches and build scripts
        run: |
          GN_REF="${{ github.event.inputs.gamenative_ref || 'proton_10.0' }}"
          git clone --depth=1 --branch "$GN_REF" \
            https://github.com/GameNative/proton-wine gamenative-src \
          || {
            git clone --depth=1 https://github.com/GameNative/proton-wine gamenative-src
            git -C gamenative-src fetch --depth=1 origin "$GN_REF"
            git -C gamenative-src checkout FETCH_HEAD
          }
          echo "GameNative ref: $GN_REF"
          git -C gamenative-src rev-parse HEAD
          cp -r gamenative-src/android wine-source/android
          cp -r gamenative-src/build-scripts wine-source/build-scripts
          rm -rf gamenative-src

          if [ "${{ inputs.disable_gamenative_patches && 'true' || 'false' }}" = "true" ]; then
            for f in wine-source/build-scripts/build-step-arm64ec.sh wine-source/build-scripts/build-step-x86_64.sh; do
              awk 'BEGIN{in_patches=0} /PATCHES=\(/{print; in_patches=1; next} in_patches && /^[[:space:]]*\)/{in_patches=0; print; next} !in_patches{print; next} /"dlls_winepulse_drv_pulse_c.patch"/{print; next} /"dlls_ntdll_unix_esync_c.patch"/{print; next} /"server_esync_c.patch"/{print; next} /"dlls_winex11_drv_bitblt_c.patch"/{print; next} /"dlls_winex11_drv_mouse_c.patch"/{print; next}' "$f" > "$f.tmp"
              mv "$f.tmp" "$f"
              echo "Kept mandatory build-fix patches in $f"
            done
            python3 scripts/fix_wineboot_c.py wine-source
            python3 scripts/fix_wdscore.py wine-source
            python3 scripts/fix_fsync.py wine-source
            python3 scripts/fix_virtual_c.py wine-source
            python3 -c "from pathlib import Path; p=Path('wine-source/dlls/winex11.drv/window.c'); s=p.read_text(encoding='utf-8'); old='                /* listen to raw xinput event in the desktop window thread */\n                data->xinput2_rawinput = TRUE;\n                x11drv_xinput2_enable( data->display, DefaultRootWindow( data->display ) );\n'; new='                /* listen to raw xinput event in the desktop window thread */\n#ifndef __ANDROID__\n                data->xinput2_rawinput = TRUE;\n                x11drv_xinput2_enable( data->display, DefaultRootWindow( data->display ) );\n#endif\n'; p.write_text(s.replace(old, new, 1), encoding='utf-8') if old in s and new not in s else None"
            echo "=== GameNative feature patches disabled; mandatory build fixes kept ==="
            printf '%s\n' \
              'dlls_winepulse_drv_pulse_c.patch kept' \
              'dlls_ntdll_unix_esync_c.patch kept' \
              'server_esync_c.patch kept' \
              'dlls_winex11_drv_bitblt_c.patch kept' \
              'dlls_winex11_drv_mouse_c.patch kept' \
              'fix_wineboot_c.py kept' \
              'fix_wdscore.py kept' \
              'fix_fsync.py kept' \
              'fix_virtual_c.py kept' \
              'winex11 window.c Android xinput2_rawinput guard kept via inline build fix' \
              'repo-side feature patch injection skipped'
          else

          rm -f wine-source/android/patches/dlls_wow64_syscall_c.patch
          rm -f wine-source/android/patches/test-bylaws/dlls_wow64_syscall_c.patch
          rm -f wine-source/android/patches/test-bylaws/dlls_ntdll_signal_arm64ec_c.patch
          mkdir -p wine-source/android/patches/test-bylaws
          cp "ge-second-pass/test-bylaws/dlls_wow64_syscall_c.patch" \
            "wine-source/android/patches/dlls_wow64_syscall_c.patch"
          cp "ge-second-pass/test-bylaws/dlls_wow64_syscall_c.patch" \
            "wine-source/android/patches/test-bylaws/dlls_wow64_syscall_c.patch"
          cp "ge-second-pass/test-bylaws/dlls_ntdll_signal_arm64ec_c.patch" \
            "wine-source/android/patches/test-bylaws/dlls_ntdll_signal_arm64ec_c.patch"
          find wine-source/android/patches -type f -name "*.patch" -exec sed -i 's/\r$//' {} +
          sed -i 's/atoi("WINE_X11FORCEGLX")/atoi(getenv("WINE_X11FORCEGLX"))/g' \
            wine-source/android/patches/dlls_winex11_drv_opengl_c.patch

          OPTIONAL_SHELL32_PATCH="shell32_shlfileop_init_path_components.patch"
          cp "patches/ge-gamenative-firstpass/shell32/$OPTIONAL_SHELL32_PATCH" \
            "wine-source/android/patches/$OPTIONAL_SHELL32_PATCH"
          python3 scripts/inject_optional_patches.py wine-source/build-scripts/build-step-arm64ec.sh \
            "$OPTIONAL_SHELL32_PATCH"
          python3 scripts/inject_optional_patches.py wine-source/build-scripts/build-step-x86_64.sh \
            "$OPTIONAL_SHELL32_PATCH"
          echo "=== shell32 SHFileOperation null-path workaround applied ==="
          printf '%s\n' "$OPTIONAL_SHELL32_PATCH"

          OPTIONAL_EXPLORER_PATCH="explorer_startmenu_shutdown_latch.patch"
          cp "patches/ge-gamenative-firstpass/explorer/$OPTIONAL_EXPLORER_PATCH" \
            "wine-source/android/patches/$OPTIONAL_EXPLORER_PATCH"
          python3 scripts/inject_optional_patches.py wine-source/build-scripts/build-step-arm64ec.sh \
            "$OPTIONAL_EXPLORER_PATCH"
          python3 scripts/inject_optional_patches.py wine-source/build-scripts/build-step-x86_64.sh \
            "$OPTIONAL_EXPLORER_PATCH"
          echo "=== explorer start menu shutdown workaround applied ==="
          printf '%s\n' "$OPTIONAL_EXPLORER_PATCH"

          if [ "${{ github.event.inputs.extra_winebus_patches || 'false' }}" = "true" ]; then
            OPTIONAL_WINEBUS_BASE="https://raw.githubusercontent.com/GloriousEggroll/proton-ge-custom/master/patches/wine-hotfixes/wine-wayland"
            OPTIONAL_WINEBUS_DIR="wine-source/android/patches/optional-winebus"
            mkdir -p "$OPTIONAL_WINEBUS_DIR"
            for patch in \
              0067-winebus-Ignore-steam-input-virtual-controller-when-P.patch \
              0083-fixup-winebus-Allow-disabling-steam-input-seperately.patch \
              0106-winebus-remove-duplicate-code.patch; do
              wget -q "$OPTIONAL_WINEBUS_BASE/$patch" -O "$OPTIONAL_WINEBUS_DIR/$patch"
              sed -i 's/\r$//' "$OPTIONAL_WINEBUS_DIR/$patch"
            done
            cp "$OPTIONAL_WINEBUS_DIR"/*.patch wine-source/android/patches/
            python3 scripts/inject_optional_patches.py wine-source/build-scripts/build-step-arm64ec.sh \
              0067-winebus-Ignore-steam-input-virtual-controller-when-P.patch \
              0083-fixup-winebus-Allow-disabling-steam-input-seperately.patch \
              0106-winebus-remove-duplicate-code.patch
            python3 scripts/inject_optional_patches.py wine-source/build-scripts/build-step-x86_64.sh \
              0067-winebus-Ignore-steam-input-virtual-controller-when-P.patch \
              0083-fixup-winebus-Allow-disabling-steam-input-seperately.patch \
              0106-winebus-remove-duplicate-code.patch
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.ge_perf_second_pass && 'true' || 'false' }}" = "true" ]; then
            OPTIONAL_GE_PERF_DIR="wine-source/android/patches/optional-ge-perf"
            OPTIONAL_GE_PERF_PATCH="6559c43-ntdll-validate-fd-type-in-ioctl-afd-wine-complete-async.patch"
            OPTIONAL_GE_EVENT_PATCH="dlls_winex11_drv_event_c.patch"
            mkdir -p "$OPTIONAL_GE_PERF_DIR"
            cp "ge-second-pass/performance/$OPTIONAL_GE_PERF_PATCH" "$OPTIONAL_GE_PERF_DIR/"
            cp "$OPTIONAL_GE_PERF_DIR"/*.patch wine-source/android/patches/
            cp "ge-second-pass/mouse/dlls_winex11_drv_mouse_c.patch" "wine-source/android/patches/dlls_winex11_drv_mouse_c.patch"
            python3 scripts/inject_optional_patches.py wine-source/build-scripts/build-step-arm64ec.sh "$OPTIONAL_GE_PERF_PATCH"
            python3 scripts/inject_optional_patches.py wine-source/build-scripts/build-step-x86_64.sh "$OPTIONAL_GE_PERF_PATCH"
            cp "ge-second-pass/focus/$OPTIONAL_GE_EVENT_PATCH" "$OPTIONAL_GE_PERF_DIR/"
            cp "$OPTIONAL_GE_PERF_DIR/$OPTIONAL_GE_EVENT_PATCH" wine-source/android/patches/
            python3 scripts/inject_optional_patches.py wine-source/build-scripts/build-step-arm64ec.sh "$OPTIONAL_GE_EVENT_PATCH"
            python3 scripts/inject_optional_patches.py wine-source/build-scripts/build-step-x86_64.sh "$OPTIONAL_GE_EVENT_PATCH"
          fi


          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dinput_android_compat_workaround && 'true' || 'false' }}" = "true" ]; then
            OPTIONAL_DINPUT_ANDROID_COMPAT_PATCH="dlls_dinput_android_compat.patch"
            OPTIONAL_ANDROID_RELATIVE_MOUSE_PATCH="dlls_wineandroid_drv_window_c.patch"
            cp "ge-second-pass/input/$OPTIONAL_DINPUT_ANDROID_COMPAT_PATCH" "wine-source/android/patches/$OPTIONAL_DINPUT_ANDROID_COMPAT_PATCH"
            cp "ge-second-pass/input/$OPTIONAL_ANDROID_RELATIVE_MOUSE_PATCH" "wine-source/android/patches/$OPTIONAL_ANDROID_RELATIVE_MOUSE_PATCH"
            python3 scripts/inject_optional_patches.py wine-source/build-scripts/build-step-arm64ec.sh "$OPTIONAL_DINPUT_ANDROID_COMPAT_PATCH"
            python3 scripts/inject_optional_patches.py wine-source/build-scripts/build-step-x86_64.sh "$OPTIONAL_DINPUT_ANDROID_COMPAT_PATCH"
            python3 scripts/inject_optional_patches.py wine-source/build-scripts/build-step-arm64ec.sh "$OPTIONAL_ANDROID_RELATIVE_MOUSE_PATCH"
            python3 scripts/inject_optional_patches.py wine-source/build-scripts/build-step-x86_64.sh "$OPTIONAL_ANDROID_RELATIVE_MOUSE_PATCH"
            echo "=== Android input compatibility workarounds applied ==="
            printf '%s\n' "$OPTIONAL_DINPUT_ANDROID_COMPAT_PATCH" "$OPTIONAL_ANDROID_RELATIVE_MOUSE_PATCH"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.input_poll_debug && 'true' || 'false' }}" = "true" ]; then
            OPTIONAL_INPUT_DEBUG_PATCH="zz_input_poll_debug.patch"
            OPTIONAL_DINPUT_INSTANCE_DEBUG_PATCH="zz_dinput_instance_debug.patch"
            cp "ge-second-pass/keyboard/$OPTIONAL_INPUT_DEBUG_PATCH" "wine-source/android/patches/$OPTIONAL_INPUT_DEBUG_PATCH"
            cp "ge-second-pass/input/$OPTIONAL_DINPUT_INSTANCE_DEBUG_PATCH" "wine-source/android/patches/$OPTIONAL_DINPUT_INSTANCE_DEBUG_PATCH"
            python3 scripts/inject_optional_patches.py wine-source/build-scripts/build-step-arm64ec.sh "$OPTIONAL_INPUT_DEBUG_PATCH"
            python3 scripts/inject_optional_patches.py wine-source/build-scripts/build-step-x86_64.sh "$OPTIONAL_INPUT_DEBUG_PATCH"
            python3 scripts/inject_optional_patches.py wine-source/build-scripts/build-step-arm64ec.sh "$OPTIONAL_DINPUT_INSTANCE_DEBUG_PATCH"
            python3 scripts/inject_optional_patches.py wine-source/build-scripts/build-step-x86_64.sh "$OPTIONAL_DINPUT_INSTANCE_DEBUG_PATCH"
            echo "=== Input polling and DirectInput instance debug instrumentation patches applied ==="
            printf '%s\n' "$OPTIONAL_INPUT_DEBUG_PATCH" "$OPTIONAL_DINPUT_INSTANCE_DEBUG_PATCH"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dinput_android_compat_workaround && 'true' || 'false' }}" = "true" ]; then
            python3 scripts/fix_wineandroid_window_c.py wine-source
          fi
          python3 scripts/fix_mouse_c.py wine-source
          python3 scripts/filter_patches.py wine-source/build-scripts/build-step-arm64ec.sh wine-source
          python3 scripts/filter_patches.py wine-source/build-scripts/build-step-x86_64.sh wine-source
          python3 scripts/patch_build_script.py wine-source/build-scripts/build-step-arm64ec.sh
          python3 scripts/patch_build_script.py wine-source/build-scripts/build-step-x86_64.sh

          python3 scripts/fix_window_c.py wine-source
          python3 scripts/fix_wineboot_c.py wine-source
          python3 scripts/fix_wdscore.py wine-source
          python3 scripts/fix_virtual_c.py wine-source
          python3 scripts/fix_fsync.py wine-source
          python3 scripts/fix_suspend_chain.py wine-source

          echo "=== repo-owned BYLAWS overrides ==="
          ls -la wine-source/android/patches/test-bylaws | grep -E 'dlls_(wow64_syscall|ntdll_signal_arm64ec)_c\.patch' || true
          echo "=== fix_test_bylaws_chain.py header ==="
          sed -n '1,40p' scripts/fix_test_bylaws_chain.py
          if ! grep -q 'Script rev: 2026-03-07-driftproof-v2' scripts/fix_test_bylaws_chain.py; then echo 'ERROR: stale fix_test_bylaws_chain.py in runner'; exit 97; fi
          python3 scripts/fix_test_bylaws_chain.py wine-source
          echo "=== BYLAWS patches applied ==="
          printf '%s\n' \
            'dlls_wow64_syscall_c.patch (repo-owned override copied to android/patches and test-bylaws)' \
            'test-bylaws/dlls_ntdll_signal_arm64ec_c.patch (repo-owned override copied to test-bylaws)'
          fi

          PROFILE_VERSION="${{ matrix.profile_version }}"
          TARGET_APP_ID="${{ github.event.inputs.target_app_id || 'app.gamenative' }}"
          INSTALL_DIR="/data/data/${TARGET_APP_ID}/files/imagefs/opt/proton-${PROFILE_VERSION}"
          RUNTIME_PATH="/data/data/${TARGET_APP_ID}/files/imagefs/usr"
          echo "Using target_app_id=$TARGET_APP_ID"
          echo "Using profile_version=$PROFILE_VERSION"
          echo "Using install_dir=$INSTALL_DIR"
          echo "Using RUNTIME_PATH=$RUNTIME_PATH"
          sed -i "s|export install_dir=.*|export install_dir=${INSTALL_DIR}|" "wine-source/build-scripts/${{ matrix.build_script }}"
          sed -i "s|export RUNTIME_PATH=.*|export RUNTIME_PATH=\"${RUNTIME_PATH}\"|" "wine-source/build-scripts/${{ matrix.build_script }}"

      - name: Download and extract termuxfs for ${{ matrix.termux_arch }}
        run: |
          TERMUX_DIR="$HOME/termuxfs/${{ matrix.termux_arch }}"
          if [ ! -d "$TERMUX_DIR/data/data/com.termux/files/usr/include" ]; then
            echo "termuxfs not found, downloading..."
            mkdir -p "$TERMUX_DIR"
            cd "$TERMUX_DIR"
            wget -q "https://github.com/GameNative/termux-on-gha/releases/download/build-20260218/termuxfs-${{ matrix.termux_arch }}.tar"
            tar -xf "termuxfs-${{ matrix.termux_arch }}.tar"
            rm -f "termuxfs-${{ matrix.termux_arch }}.tar"
          else
            echo "termuxfs already present, skipping download."
          fi

      - name: Set up Android NDK
        run: |
          NDK_DIR="$HOME/Android/Sdk/ndk/27.3.13750724"
          if [ ! -d "$NDK_DIR" ]; then
            echo "NDK not found, downloading..."
            mkdir -p "$HOME/Android/Sdk/ndk"
            cd "$HOME/Android/Sdk/ndk"
            wget -q https://dl.google.com/android/repository/android-ndk-r27d-linux.zip
            unzip -q android-ndk-r27d-linux.zip
            mv android-ndk-r27d 27.3.13750724
          else
            echo "NDK already installed, skipping download."
          fi

      - name: Set up LLVM MinGW toolchain
        run: |
          LLVM_DIR="$HOME/toolchains/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64"
          if [ ! -f "$LLVM_DIR/bin/llvm-dlltool" ]; then
            echo "LLVM MinGW not found, downloading..."
            mkdir -p "$HOME/toolchains"
            cd "$HOME/toolchains"
            wget -q https://github.com/bylaws/llvm-mingw/releases/download/20250920/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz
            tar -xf llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64.tar.xz
          else
            echo "LLVM MinGW already installed, skipping download."
          fi

      - name: Add bylaws llvm-mingw to PATH
        run: |
          echo "$HOME/toolchains/llvm-mingw-20250920-ucrt-ubuntu-22.04-x86_64/bin" >> "$GITHUB_PATH"

      - name: Run autogen.sh
        run: |
          cd wine-source
          bash autogen.sh

      - name: Cache wine-tools
        id: cache-wine-tools
        uses: actions/cache@v4
        with:
          path: wine-source/wine-tools
          key: wine-tools-${{ matrix.arch_id }}-${{ hashFiles('wine-source/configure.ac', 'wine-source/configure') }}
          restore-keys: wine-tools-${{ matrix.arch_id }}-

      - name: Build wine-tools
        if: steps.cache-wine-tools.outputs.cache-hit != 'true'
        run: |
          cd wine-source
          mkdir -p wine-tools
          cd wine-tools
          ../configure --without-x --without-gstreamer --without-vulkan --without-wayland --without-xinput2
          make -j$(nproc) __tooldeps__ nls/all

      - name: Build sysvshm library
        if: matrix.sysvshm
        run: |
          cd wine-source
          bash "build-scripts/${{ matrix.build_script }}" --build-sysvshm

      - name: Configure build
        id: configure_build
        continue-on-error: true
        run: |
          cd wine-source
          set -o pipefail
          bash -e "build-scripts/${{ matrix.build_script }}" --configure 2>&1 | tee configure-run.log
          test -f Makefile

      - name: Dump configure logs
        if: steps.configure_build.outcome == 'failure'
        run: |
          cd wine-source
          echo "ERROR: configure did not produce ./Makefile or configure exited early"
          if [ -f ./configure-run.log ]; then
            echo "=== tail: ./configure-run.log ==="
            tail -n 250 ./configure-run.log || true
          fi
          find . -maxdepth 2 \( -name config.log -o -name configure.log -o -name config.status \) -print || true
          if [ -f ./config.log ]; then
            echo "=== tail: ./config.log ==="
            tail -n 250 ./config.log || true
          fi
          if [ -f ./wine-tools/config.log ]; then
            echo "=== tail: ./wine-tools/config.log ==="
            tail -n 120 ./wine-tools/config.log || true
          fi
          exit 1

      - name: Verify critical patch markers
        run: |
          python3 scripts/verify_required_markers.py wine-source

      - name: Build Proton
        run: |
          cd wine-source
          bash "build-scripts/${{ matrix.build_script }}" --build

      - name: Collect shell32 debug bundle
        run: |
          BUNDLE_DIR="$GITHUB_WORKSPACE/output/shell32-debug-${{ matrix.arch_id }}"
          mkdir -p "$BUNDLE_DIR"
          mkdir -p "$BUNDLE_DIR/aarch64-windows" "$BUNDLE_DIR/arm64ec-windows" "$BUNDLE_DIR/android-patches"

          cp -f wine-source/dlls/shell32/shfldr_mycomp.c "$BUNDLE_DIR/"
          cp -f wine-source/dlls/shell32/shlfolder.c "$BUNDLE_DIR/"
          cp -f wine-source/dlls/shell32/shlfileop.c "$BUNDLE_DIR/"
          cp -f wine-source/dlls/shell32/pidl.c "$BUNDLE_DIR/"
          cp -f wine-source/dlls/shell32/shfldr_fs.c "$BUNDLE_DIR/"
          cp -f wine-source/dlls/shell32/Makefile.in "$BUNDLE_DIR/"
          cp -f wine-source/build-scripts/${{ matrix.build_script }} "$BUNDLE_DIR/"
          cp -f wine-source/dlls/shell32/aarch64-windows/shell32.dll "$BUNDLE_DIR/aarch64-windows/"
          cp -f wine-source/dlls/shell32/aarch64-windows/*.o "$BUNDLE_DIR/aarch64-windows/" 2>/dev/null || true
          cp -f wine-source/dlls/shell32/arm64ec-windows/*.o "$BUNDLE_DIR/arm64ec-windows/" 2>/dev/null || true
          cp -f wine-source/android/patches/shell32_shlfileop_init_path_components.patch "$BUNDLE_DIR/android-patches/" 2>/dev/null || true
          cp -f wine-source/android/patches/explorer_startmenu_shutdown_latch.patch "$BUNDLE_DIR/android-patches/" 2>/dev/null || true
          git -C wine-source rev-parse HEAD > "$BUNDLE_DIR/wine_commit.txt"

      - name: Install Proton
        run: |
          PROFILE_VERSION="${{ matrix.profile_version }}"
          TARGET_APP_ID="${{ github.event.inputs.target_app_id || 'app.gamenative' }}"
          sudo mkdir -p "/data/data/${TARGET_APP_ID}/files/imagefs/opt/proton-${PROFILE_VERSION}"
          sudo chmod -R 777 /data/data

          cd wine-source
          bash "build-scripts/${{ matrix.build_script }}" --install

          OUTPUT_DIR="$HOME/${{ matrix.output_dir }}"
          echo "=== OUTPUT_DIR bin contents ==="
          ls -la "$OUTPUT_DIR/bin/" || true
          echo "=== wine binary type ==="
          file "$OUTPUT_DIR/bin/wine" 2>/dev/null || true
          file "$OUTPUT_DIR/bin/wineserver" 2>/dev/null || true

          echo "=== Ensuring core D3D DLLs are staged ==="
          ensure_d3d_dll() {
            local arch_dir="$1"
            local dll_name="$2"
            local dst="$OUTPUT_DIR/lib/wine/$arch_dir/$dll_name"
            if [ -f "$dst" ]; then
              echo "present: $dst"
              return 0
            fi
            local src
            src="$(find "$PWD" -type f \( -name "$dll_name" -o -name "$dll_name.so" -o -name "$dll_name.dll.so" \) | grep "/$arch_dir/" | head -n 1 || true)"
            if [ -n "$src" ]; then
              mkdir -p "$(dirname "$dst")"
              cp -f "$src" "$dst"
              echo "staged: $src -> $dst"
            else
              echo "missing: $dll_name for $arch_dir"
            fi
          }

          for arch_dir in aarch64-windows i386-windows; do
            ensure_d3d_dll "$arch_dir" d3d8.dll
            ensure_d3d_dll "$arch_dir" d3d8thk.dll
            ensure_d3d_dll "$arch_dir" d3d9.dll
            ensure_d3d_dll "$arch_dir" wined3d.dll
          done

      - name: Download prefixPack.txz
        run: |
          wget -q "https://github.com/GameNative/bionic-prefix-files/raw/main/${{ matrix.prefix_pack }}" \
            -O "$HOME/${{ matrix.output_dir }}/prefixPack.txz"

      - name: Generate profile.json files and package
        run: |
          OUTPUT_DIR="$HOME/${{ matrix.output_dir }}"
          GIT_HASH=$(git -C wine-source rev-parse --short HEAD)
          GIT_DATE=$(git -C wine-source log -1 --format='%cd' --date=format:'%Y%m%d')
          VERSION="proton-bleeding-edge-${GIT_DATE}-${GIT_HASH}-${{ matrix.arch_id }}"
          PROFILE_VERSION="${{ matrix.profile_version }}"
          DISPLAY_NAME="Proton bleeding-edge ${{ matrix.display_arch }} ${GIT_DATE} (${GIT_HASH})"

          mkdir -p "$GITHUB_WORKSPACE/output"
          PROTON_VERSION_CODE=1
          WINE_VERSION_CODE=0

          python3 scripts/generate_profile.py \
            "${OUTPUT_DIR}/profile.json" \
            "${PROFILE_VERSION}" \
            "${PROTON_VERSION_CODE}" \
            "${DISPLAY_NAME}"

          bash "$GITHUB_WORKSPACE/scripts/create-proton-wcp.sh" \
            "$OUTPUT_DIR" \
            "$GITHUB_WORKSPACE/output/proton-${VERSION}.wcp" \
            "${PROFILE_VERSION}" \
            "${PROTON_VERSION_CODE}" \
            "${DISPLAY_NAME}"

          python3 scripts/generate_profile.py \
            "${OUTPUT_DIR}/profile.json" \
            "${PROFILE_VERSION}" \
            "${WINE_VERSION_CODE}" \
            "${DISPLAY_NAME}" \
            wine

          cd "$OUTPUT_DIR"
          tar cJf "$GITHUB_WORKSPACE/output/proton-wine-${VERSION}.wcp.xz" \
            bin lib share prefixPack.txz profile.json

          cd "$GITHUB_WORKSPACE"
          sha256sum "output/proton-wine-${VERSION}.wcp.xz" > "output/proton-wine-${VERSION}.wcp.xz.sha256"

          WCP_SHA=$(cut -d' ' -f1 "output/proton-${VERSION}.wcp.sha256")
          WCPXZ_SHA=$(cut -d' ' -f1 "output/proton-wine-${VERSION}.wcp.xz.sha256")

          cat > "output/metadata-${{ matrix.arch_id }}.json" <<EOF
          {
            "arch": "${{ matrix.arch_id }}",
            "gitHash": "${GIT_HASH}",
            "gitDate": "${GIT_DATE}",
            "version": "${VERSION}",
            "profileVersion": "${PROFILE_VERSION}",
            "wcpFile": "proton-${VERSION}.wcp",
            "wcpSha": "${WCP_SHA}",
            "wcpxzFile": "proton-wine-${VERSION}.wcp.xz",
            "wcpxzSha": "${WCPXZ_SHA}"
          }
          EOF

          ls -lh output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proton-bleeding-edge-${{ matrix.arch_id }}
          path: output/
          retention-days: 30

      - name: Upload shell32 debug bundle
        uses: actions/upload-artifact@v4
        with:
          name: shell32-debug-${{ matrix.arch_id }}
          path: output/shell32-debug-${{ matrix.arch_id }}/
          retention-days: 30

  release:
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.skip_build != 'true'
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-24.04' }}
    permissions:
      contents: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Detect release-worthy changes
        id: detect_changes
        run: |
          python3 <<'PY'
          import glob
          import json
          import os
          from pathlib import Path

          metas = {}
          for path in glob.glob("artifacts/**/metadata-*.json", recursive=True):
              data = json.loads(Path(path).read_text())
              metas[data["arch"]] = data

          if "arm64ec" not in metas:
              raise SystemExit("missing metadata file for: arm64ec")

          arm = metas["arm64ec"]
          latest = json.loads(Path("latest.json").read_text())
          run_suffix = os.environ['GITHUB_RUN_NUMBER']
          release_tag = f"bleeding-edge-{arm['gitDate']}-{arm['gitHash']}-run{run_suffix}"

          artifacts = latest.get("artifacts", {})
          prev_arm = artifacts.get("arm64ec", {})

          prev_arm_wcp = prev_arm.get("wcp", {}).get("sha256") or latest.get("wcp", {}).get("sha256", "")
          prev_arm_wcpxz = prev_arm.get("wcpxz", {}).get("sha256") or latest.get("wcpxz", {}).get("sha256", "")

          should_release = (
              arm["gitHash"] != latest.get("gitHash", "")
              or arm["wcpSha"] != prev_arm_wcp
              or arm["wcpxzSha"] != prev_arm_wcpxz
          )

          outputs = {
              "git_hash": arm["gitHash"],
              "git_date": arm["gitDate"],
              "release_tag": release_tag,
              "should_release": "true" if should_release else "false",
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              for key, value in outputs.items():
                  fh.write(f"{key}={value}\n")

          print(json.dumps({
              "previousGitHash": latest.get("gitHash", ""),
              "currentGitHash": arm["gitHash"],
              "previousArmWcpSha": prev_arm_wcp,
              "currentArmWcpSha": arm["wcpSha"],
              "previousArmWcpxzSha": prev_arm_wcpxz,
              "currentArmWcpxzSha": arm["wcpxzSha"],
              "shouldRelease": should_release,
          }, indent=2))
          PY

      - name: Prepare release files
        if: steps.detect_changes.outputs.should_release == 'true'
        run: |
          mkdir -p release
          find artifacts -name "*.wcp" -exec cp {} release/ \;
          find artifacts -name "*.wcp.xz" -exec cp {} release/ \;
          ls -lah release/

      - name: Create GitHub Release
        if: steps.detect_changes.outputs.should_release == 'true'
        run: |
          GIT_HASH="${{ steps.detect_changes.outputs.git_hash }}"
          GIT_DATE="${{ steps.detect_changes.outputs.git_date }}"
          TAG="${{ steps.detect_changes.outputs.release_tag }}"
          TITLE="Proton bleeding-edge ARM64EC (${GIT_DATE})"
          NOTES="Built from ValveSoftware/wine bleeding-edge @ ${GIT_HASH} with GameNative Android build scripts. Includes ARM64EC packages in the same release. Automated bleeding-edge build; use at your own risk."
          gh release create "$TAG" release/* \
            --title "$TITLE" \
            --notes "$NOTES" \
            --prerelease \
            || gh release upload "$TAG" release/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest.json
        if: steps.detect_changes.outputs.should_release == 'true'
        run: |
          python3 <<'PY'
          import glob
          import json
          from pathlib import Path

          metas = {}
          for path in glob.glob("artifacts/**/metadata-*.json", recursive=True):
              data = json.loads(Path(path).read_text())
              metas[data["arch"]] = data

          arm = metas["arm64ec"]
          data = {
              "versionName": arm["version"],
              "date": arm["gitDate"],
              "gitHash": arm["gitHash"],
              "wcp": {
                  "fileName": arm["wcpFile"],
                  "sha256": arm["wcpSha"],
              },
              "wcpxz": {
                  "fileName": arm["wcpxzFile"],
                  "sha256": arm["wcpxzSha"],
              },
              "artifacts": {
                  "arm64ec": {
                      "versionName": arm["version"],
                      "profileVersion": arm["profileVersion"],
                      "wcp": {
                          "fileName": arm["wcpFile"],
                          "sha256": arm["wcpSha"],
                      },
                      "wcpxz": {
                          "fileName": arm["wcpxzFile"],
                          "sha256": arm["wcpxzSha"],
                      },
                  },
              },
              "releaseTag": "${{ steps.detect_changes.outputs.release_tag }}",
          }
          Path("latest.json").write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
          print(json.dumps(data, indent=2))
          PY

      - name: Commit latest.json
        if: steps.detect_changes.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          GIT_DATE="${{ steps.detect_changes.outputs.git_date }}"
          git diff --staged --quiet || git commit -m "chore: update latest.json for bleeding-edge ${GIT_DATE}"
          git pull --rebase origin HEAD
          git push

      - name: Cleanup runner workspace
        if: ${{ always() && contains(runner.labels, 'self-hosted') }}
        run: |
          set +e
          echo "=== Disk usage before cleanup ==="
          df -h
          rm -rf "$GITHUB_WORKSPACE/wine-source" "$GITHUB_WORKSPACE/gamenative-src" "$GITHUB_WORKSPACE/artifacts" "$GITHUB_WORKSPACE/release" || true
          rm -rf "$HOME/compiled-files-aarch64" "$HOME/compiled-files-x86_64" "$HOME/wine-staging" || true
          rm -rf "$RUNNER_TEMP"/* || true
          echo "=== Disk usage after cleanup ==="
          df -h















