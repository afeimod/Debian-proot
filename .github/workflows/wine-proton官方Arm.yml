name: Proton 官方 ARM64 构建（基于 llvm-mingw，debian12容器）

on:
  schedule:
    - cron: '0 2 5,20 * *'
  workflow_dispatch:
    inputs:
      proton_branch:
        description: 'Proton 分支'
        required: false
        default: 'proton_10.0'
        type: choice
        options:
        - proton_10.0
        - proton_9.0
        - experimental_10.0
        - bleeding-edge

env:
  LLVMMINGW_DATE: 20251202
  LLVMMINGW_NAME: llvm-mingw-20251202-ucrt-ubuntu-22.04-x86_64
  WINE64_DIR: /opt/wine64
  WINE_SOURCE_DIR: /opt/wine-src
  DEBIAN_FRONTEND: noninteractive

permissions:
  contents: write

jobs:
  build-proton-wow64:
    runs-on: ubuntu-latest
    container:
      image: debian:12
      options: --user root
    timeout-minutes: 180

    steps:
      - name: 安装基础工具
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates wget git curl gnupg sudo xz-utils g++ file

      - uses: actions/checkout@v4

      # ------------------------------------------------------------
      # 1. 配置 APT 源（支持 amd64 和 arm64，使用 Ubuntu 24.04 noble）
      # ------------------------------------------------------------
      - name: 配置 APT 源
        run: |
          if [ -f /etc/apt/sources.list ]; then
            cp /etc/apt/sources.list /etc/apt/sources.list.bak
          else
            echo "deb http://deb.debian.org/debian bookworm main contrib non-free" > /etc/apt/sources.list
            echo "deb http://deb.debian.org/debian bookworm-updates main contrib non-free" >> /etc/apt/sources.list
            echo "deb http://security.debian.org/debian-security bookworm-security main contrib non-free" >> /etc/apt/sources.list
          fi

          grep -v '^#' /etc/apt/sources.list | sed 's/^deb /deb [arch=amd64] /g' > /tmp/amd64.list
          sed -e 's/\[arch=amd64\]/[arch=arm64]/g' /tmp/amd64.list > /tmp/arm64.list
          cat /tmp/amd64.list /tmp/arm64.list > /etc/apt/sources.list

          dpkg --add-architecture arm64
          apt-get update
          apt-get install -y --no-install-recommends hello:arm64 || { echo "arm64 源测试失败"; exit 1; }

      # ------------------------------------------------------------
      # 2. 安装所有依赖（包含 GStreamer 等）
      # ------------------------------------------------------------
      - name: 安装构建依赖
        run: |
          apt-get install -y --no-install-recommends \
            binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu \
            ca-certificates nano python3 python3-setuptools clang screen llvm lld wget curl \
            flex bison nasm \
            libfreetype6-dev \
            libglib2.0-dev \
            libltdl-dev \
            libxcb1-dev \
            libx11-dev \
            librsvg2-bin \
            git gettext make automake autoconf pkg-config libtool gtk-doc-tools clang \
            dpkg-dev \
            libglib2.0-dev:arm64 \
            libfreetype6-dev:arm64 \
            libltdl-dev:arm64 \
            libxcb1-dev:arm64 \
            libx11-dev:arm64 \
            build-essential libc-dev-arm64-cross less libc-devtools libidn2-0:arm64 \
            libx11-dev libxinerama-dev libfreetype-dev libfontconfig-dev \
            cmake \
            libstdc++6-arm64-cross \
            libstdc++-12-dev-arm64-cross \
            libepoxy-dev:arm64 \
            libsdl2-dev:arm64 \
            ninja-build \
            dpkg-dev fakeroot debhelper dh-make \
            libxcursor-dev:arm64 \
            libxi-dev:arm64 \
            libxshmfence-dev:arm64 \
            libxxf86vm-dev:arm64 \
            libxrandr-dev:arm64 \
            libxrender-dev:arm64 \
            libxfixes-dev:arm64 \
            libxcomposite-dev:arm64 \
            libdbus-1-dev:arm64 \
            libsane-dev:arm64 \
            libusb-1.0-0-dev:arm64 \
            libv4l-dev:arm64 \
            libpulse-dev:arm64 \
            libunwind-dev:arm64 \
            libgstreamer1.0-dev:arm64 \
            libgstreamer-plugins-base1.0-dev:arm64 \
            gstreamer1.0-tools \
            gstreamer1.0-plugins-base:arm64 \
            gstreamer1.0-plugins-good:arm64 \
            gstreamer1.0-plugins-bad:arm64 \
            gstreamer1.0-plugins-ugly:arm64 \
            libgstreamer-plugins-bad1.0-dev:arm64 \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-ugly \
            libgstreamer-plugins-bad1.0-dev:arm64 \
            libudev-dev:arm64 \
            libunwind-dev:arm64 \
            libsdl2-dev:arm64 \
            libfontconfig1-dev:arm64 \
            libkrb5-dev:arm64 \
            libvulkan-dev:arm64 \
            libgl-dev:arm64 \
            libgnutls28-dev:arm64 \
            libcups2-dev:arm64 \
            libxkbcommon-dev:arm64 \
            libxkbregistry-dev:arm64 \
            libmpg123-dev:arm64 \
            libopenal-dev:arm64 \
            libwayland-dev:arm64

      # ------------------------------------------------------------
      # 3. 安装 llvm-mingw 交叉编译工具链
      # ------------------------------------------------------------
      - name: 下载并安装 llvm-mingw
        run: |
          mkdir -p /opt
          cd /opt
          wget https://github.com/mstorsjo/llvm-mingw/releases/download/${{ env.LLVMMINGW_DATE }}/${{ env.LLVMMINGW_NAME }}.tar.xz
          tar -xJf ${{ env.LLVMMINGW_NAME }}.tar.xz
          rm ${{ env.LLVMMINGW_NAME }}.tar.xz
          echo "/opt/${{ env.LLVMMINGW_NAME }}/bin" >> $GITHUB_PATH

      # ------------------------------------------------------------
      # 4. 设置中文语言环境
      # ------------------------------------------------------------
      - name: 设置中文语言环境
        run: |
          apt-get install -y locales
          sed -i '/zh_CN.UTF-8/s/^# //g' /etc/locale.gen
          locale-gen
          echo "LANG=zh_CN.UTF-8" >> $GITHUB_ENV
          echo "LC_ALL=zh_CN.UTF-8" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # 5. 获取 Proton 源码
      # ------------------------------------------------------------
      - name: 获取 Proton 源码
        run: |
          set -e
          PROTON_BRANCH="${{ github.event.inputs.proton_branch || 'proton_10.0' }}"

          mkdir -p ${{ env.WINE_SOURCE_DIR }}
          cd ${{ env.WINE_SOURCE_DIR }}

          echo "处理 Proton 分支: $PROTON_BRANCH"
          git clone https://github.com/GameNative/proton-wine.git source
          cd source
          git checkout "$PROTON_BRANCH"

          PROTON_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$PROTON_BRANCH")
          COMMIT_HASH=$(git rev-parse --short HEAD)
          BUILD_NAME="proton-${PROTON_VERSION_ACTUAL}-${COMMIT_HASH}-${PROTON_BRANCH}-arm64-wow64"
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "PROTON_VERSION_ACTUAL=$PROTON_VERSION_ACTUAL" >> $GITHUB_ENV
          echo "源码准备完成，构建名称: $BUILD_NAME"

      # ------------------------------------------------------------
      # 6. 修复 Termux 路径问题
      # ------------------------------------------------------------
      - name: 修复 winlator 路径问题
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) -exec grep -l "/tmp" {} \; | xargs sed -i 's|/tmp/|/data/data/com.winlator/files/imagefs/usr/tmp/|g'
          find server -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"/tmp"|"/data/data/com.winlator/files/imagefs/usr/tmp"|g' {} +
          find . -name "file.c" -exec sed -i 's|"/tmp"|"/data/data/com.winlator/files/imagefs/usr/tmp"|g' {} +
          find . -name "loader.c" -exec sed -i 's|"/tmp"|"/data/data/com.winlator/files/imagefs/usr/tmp"|g' {} +
          find . -name "server.c" -exec sed -i 's|"/tmp"|"/data/data/com.winlator/files/imagefs/usr/tmp"|g' {} +
          echo "路径修复完成"

      # ------------------------------------------------------------
      # 7. 修补 winnt.h 中的 MemoryBarrier 实现
      # ------------------------------------------------------------
      - name: 复制修复脚本和补丁目录
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          echo "=== 从当前仓库复制scripts 目录 ==="
          if [ -d "$GITHUB_WORKSPACE/scripts" ]; then
            cp -r "$GITHUB_WORKSPACE/scripts" ./
            echo "scripts 目录已复制"
          else
            echo "警告: scripts 目录不存在，跳过"
          fi
          # 确保 test-bylaws 补丁目录存在
          mkdir -p android/patches/test-bylaws
          if [ -d "ge-second-pass/test-bylaws" ]; then
            cp ge-second-pass/test-bylaws/*.patch android/patches/test-bylaws/ 2>/dev/null || true
          fi
          echo "复制完成"

      # ========== 新增：运行所有 Python 修复脚本 ==========
      - name: 运行 Python 修复脚本
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          echo "=== 运行 fix_wineboot_c.py ==="
          python3 scripts/fix_wineboot_c.py .
          echo "=== 运行 fix_wdscore.py ==="
          python3 scripts/fix_wdscore.py .
          echo "=== 运行 fix_mouse_c.py ==="
          python3 scripts/fix_mouse_c.py .
          echo "所有修复脚本执行完成"
          # 【关键】运行 fix_fsync.py
          echo "运行 fix_fsync.py..."
          python3 scripts/fix_fsync.py .
          echo "fix_fsync.py 执行完成"
          
          # 【关键】运行 fix_virtual_c.py
          echo "运行 fix_virtual_c.py..."
          python3 scripts/fix_virtual_c.py .
          echo "fix_virtual_c.py 执行完成"
          
          # 【关键】运行 fix_window_c.py
          echo "运行 fix_window_c.py..."
          python3 scripts/fix_window_c.py .
          echo "fix_window_c.py 执行完成"

      # ------------------------------------------------------------
      - name: 下载并应用 fix-build_ffmpeg.patch
        run: |
          set -e
          # 确保 patch 命令可用
          apt-get update && apt-get install -y --no-install-recommends patch

          cd ${{ env.WINE_SOURCE_DIR }}/source
          echo "下载补丁：https://raw.githubusercontent.com/Waim908/wine-termux/main/proton/10.0/fix-build_ffmpeg.patch"
          wget -q -O fix-build_ffmpeg.patch https://raw.githubusercontent.com/Waim908/wine-termux/main/proton/10.0/fix-build_ffmpeg.patch

          echo "正在应用补丁 ..."
          patch -p1 < fix-build_ffmpeg.patch

          echo "补丁应用成功，清理临时文件"
          rm fix-build_ffmpeg.patch

      - name: 修补 winnt.h 中的 MemoryBarrier 实现
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          # 备份原文件
          cp include/winnt.h include/winnt.h.bak
          # 将 MemoryBarrier 函数体中的 InterlockedOr 替换为 __sync_synchronize()
          sed -i '/static FORCEINLINE void MemoryBarrier(void)/,/^}/ {
              s/InterlockedOr(&dummy, 0);/__sync_synchronize();/
          }' include/winnt.h
          echo "MemoryBarrier 已修补为 __sync_synchronize()"
          
      - name: 修补 wineboot.c 以跳过 ARM64 上的 initialize_xstate_features 调用
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          wget -q https://github.com/afeimod/linbox/raw/main/path/fix-wineboot.patch
          patch -p1 < fix-wineboot.patch
          rm fix-wineboot.patch
      # 8. 生成 configure 脚本
      # ------------------------------------------------------------
      - name: 生成 configure 脚本
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          if [ ! -f "configure" ]; then
            ./autogen.sh
          fi

      # ------------------------------------------------------------
      # 9. 构建 native wine64 工具和 NLS（带完整备份）
      # ------------------------------------------------------------
      - name: 构建 native wine64 工具和 NLS（带完整备份）
        run: |
          set -e
          mkdir -p ${{ env.WINE64_DIR }}
          cp -r ${{ env.WINE_SOURCE_DIR }}/source ${{ env.WINE64_DIR }}/source
          cd ${{ env.WINE64_DIR }}
          mkdir -p amd64
          cd amd64
          ../source/configure --enable-win64 --prefix=/usr/local
          make __tooldeps__ -j$(nproc)
          echo "构建 NLS 目录..."
          make -C nls
          mkdir -p /opt/nls-backup
          cp -aL nls/. /opt/nls-backup/
          echo "nls 目录已完整备份到 /opt/nls-backup"
          ls -la /opt/nls-backup/

      # ------------------------------------------------------------
      # 10. 复制构建目录，跟随符号链接，并验证 NLS（带恢复机制）
      # ------------------------------------------------------------
      - name: 复制构建目录并验证 NLS（带恢复机制）
        run: |
          set -e
          mkdir -p /opt/wine64-native
          if [ ! -f ${{ env.WINE64_DIR }}/amd64/nls/locale.nls ] && [ ! -L ${{ env.WINE64_DIR }}/amd64/nls/locale.nls ]; then
            echo "警告: 源目录中 nls/locale.nls 不存在，尝试从备份恢复"
            if [ -d /opt/nls-backup ]; then
              mkdir -p ${{ env.WINE64_DIR }}/amd64/nls
              cp -af /opt/nls-backup/. ${{ env.WINE64_DIR }}/amd64/nls/
              echo "已从备份恢复完整 nls 目录"
            else
              echo "错误: 无法恢复 nls 目录"
              exit 1
            fi
          fi
          cp -aL ${{ env.WINE64_DIR }}/amd64/. /opt/wine64-native/
          chmod -R +x /opt/wine64-native/tools/*/
          chmod -R +r /opt/wine64-native/nls
          if [ ! -f /opt/wine64-native/nls/locale.nls ]; then
            echo "警告: 复制后 locale.nls 丢失或为无效符号链接，尝试从备份恢复"
            if [ -d /opt/nls-backup ]; then
              mkdir -p /opt/wine64-native/nls
              cp -af /opt/nls-backup/. /opt/wine64-native/nls/
              echo "已从备份恢复 nls 目录到目标目录"
            else
              echo "错误: 无法恢复 nls 目录"
              exit 1
            fi
          fi
          echo "复制后 locale.nls 存在，大小: $(wc -c < /opt/wine64-native/nls/locale.nls) 字节"

      # ------------------------------------------------------------
      # 11. 交叉编译 ARM64 WOW64（使用 bash 执行）
      # ------------------------------------------------------------
      - name: 交叉编译 ARM64 WOW64
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          mkdir -p build-arm64
          cd build-arm64

          export PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin:$PATH"
          export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          export PKG_CONFIG_SYSROOT_DIR=/
          export CFLAGS="-O3 -pipe"
          export CXXFLAGS="-O3 -pipe"
          export CROSSCFLAGS="-O3 -pipe"
          export CROSSCXXFLAGS="-O3 -pipe"
          export LDFLAGS="-s -Wl,--dynamic-linker=/data/data/com.winlator/files/imagefs/usr/lib/ld-linux-aarch64.so.1 -Wl,-rpath=/data/data/com.winlator/files/imagefs/usr/lib"
          export WINE_NLS_DIR=/opt/wine64-native/nls

          echo "使用 Wine64 构建目录（作为工具目录）: /opt/wine64-native"
          echo "WINE_NLS_DIR=$WINE_NLS_DIR"

          ../configure \
            --prefix=/data/data/com.winlator/files/imagefs/usr \
            --with-mingw=clang \
            --enable-archs=arm64ec,aarch64,i386 \
            --enable-tools \
            --disable-tests \
            --with-x \
            --with-vulkan \
            --with-alsa \
            --with-pulse \
            --with-freetype \
            --with-fontconfig \
            --with-gstreamer \
            --with-gettext \
            --with-sdl \
            --enable-nls \
            --disable-win16 \
            --disable-tests \
            --without-capi \
            --without-oss \
            --without-cups \
            --without-dbus \
            --without-coreaudio \
            --without-gphoto \
            --without-osmesa \
            --without-sane \
            --without-pcap \
            --without-pcsclite \
            --without-udev \
            --without-unwind \
            --without-usb \
            --without-v4l2 \
            --without-wayland \
            --host=aarch64-linux-gnu \
            host_alias=aarch64-linux-gnu \
            build_alias=x86_64-linux-gnu \
            --with-wine-tools=/opt/wine64-native \
            CC=aarch64-linux-gnu-gcc

          # 使用 set -o pipefail 确保 tee 不掩盖 make 错误
          set -o pipefail
          make -s -j$(nproc) 2>&1 | tee build_cross.log
          if [ $? -ne 0 ]; then
              echo "❌ 编译失败，最后200行日志："
              tail -n 200 build_cross.log
              exit 1
          fi

          make install

          if [ ! -d /data/data/com.winlator/files/imagefs/usr/bin ]; then
            echo "错误: /data/data/com.winlator/files/imagefs/usr/bin 目录不存在，安装可能不完整"
            exit 1
          fi
        shell: bash  # 显式指定使用 bash

      # ------------------------------------------------------------
      # 12. 全面补全安装目录的运行时文件（增强版，使用 bash）
      # ------------------------------------------------------------
      - name: 全面补全安装目录的运行时文件（增强版）
        run: |
          set -ex  # 开启调试，便于排查
          TARGET_PREFIX="/data/data/com.winlator/files/imagefs/usr"
          BUILD_DIR="${{ env.WINE_SOURCE_DIR }}/source/build-arm64"
          SOURCE_DIR="${{ env.WINE_SOURCE_DIR }}/source"
          NATIVE_NLS_DIR="/opt/wine64-native/nls"
          SOURCE_FONTS_DIR="$SOURCE_DIR/fonts"

          echo "=== 补全 share/wine/nls ==="
          mkdir -p "$TARGET_PREFIX/share/wine/nls"
          if [ -d "$NATIVE_NLS_DIR" ]; then
              cp -v "$NATIVE_NLS_DIR"/*.nls "$TARGET_PREFIX/share/wine/nls/" 2>/dev/null || echo "没有找到 .nls 文件，可能已存在"
          fi
          if [ ! -f "$TARGET_PREFIX/share/wine/nls/locale.nls" ] && [ -f "/opt/nls-backup/locale.nls" ]; then
              cp -v "/opt/nls-backup/locale.nls" "$TARGET_PREFIX/share/wine/nls/"
          fi

          echo "=== 补全 share/wine/fonts ==="
          if [ -d "$SOURCE_FONTS_DIR" ]; then
              mkdir -p "$TARGET_PREFIX/share/wine/fonts"
              # 使用循环避免通配符无匹配时出错
              for font in "$SOURCE_FONTS_DIR"/*.ttf "$SOURCE_FONTS_DIR"/*.fon; do
                  [ -e "$font" ] && cp -v "$font" "$TARGET_PREFIX/share/wine/fonts/"
              done || echo "字体复制完成或无字体文件"
          else
              echo "警告: 源码 fonts 目录不存在，跳过字体复制"
          fi

          echo "=== 补全 wine.inf ==="
          WINE_INF_SRC=$(find "$BUILD_DIR" -name "wine.inf" -type f 2>/dev/null | head -1)
          if [ -z "$WINE_INF_SRC" ]; then
              if [ -f "$SOURCE_DIR/dlls/wine.inf/wine.inf" ]; then
                  WINE_INF_SRC="$SOURCE_DIR/dlls/wine.inf/wine.inf"
              elif [ -f "$SOURCE_DIR/dlls/wine.inf/wine.inf.in" ]; then
                  WINE_INF_SRC="$SOURCE_DIR/dlls/wine.inf/wine.inf.in"
              fi
          fi
          if [ -n "$WINE_INF_SRC" ]; then
              mkdir -p "$TARGET_PREFIX/share/wine"
              cp -v "$WINE_INF_SRC" "$TARGET_PREFIX/share/wine/wine.inf"
          else
              echo "警告: 未找到 wine.inf 文件"
          fi

          echo "=== 补全关键程序文件 ==="
          BIN_DIR="$TARGET_PREFIX/bin"
          mkdir -p "$BIN_DIR"

          PROGRAMS="wine wineserver wineboot winecfg regedit"
          for prog in $PROGRAMS; do
              if [ -f "$BIN_DIR/$prog" ]; then
                  echo "文件 $BIN_DIR/$prog 已存在"
                  continue
              fi
              found=""
              if [ "$prog" != "wine" ] && [ "$prog" != "wineserver" ]; then
                  found=$(find "$BUILD_DIR/programs" -type f -name "$prog" -executable 2>/dev/null | head -1)
              fi
              if [ -z "$found" ]; then
                  found=$(find "$BUILD_DIR" -type f -name "$prog" -executable 2>/dev/null | head -1)
              fi
              if [ -n "$found" ]; then
                  cp -v "$found" "$BIN_DIR/"
              else
                  echo "错误: 完全未找到 $prog"
                  exit 1
              fi
          done

          echo "=== 验证 bin 目录关键文件 ==="
          ls -la "$BIN_DIR"
          for required in wine wineserver wineboot; do
              if [ ! -f "$BIN_DIR/$required" ] && [ ! -L "$BIN_DIR/$required" ]; then
                  echo "错误: 缺少关键文件 $required"
                  exit 1
              else
                  echo "✓ $required 存在"
              fi
          done

          echo "=== 最终安装目录结构预览 ==="
          ls -la "$TARGET_PREFIX/share/wine/" || true
          ls -la "$TARGET_PREFIX/bin/" || true
        shell: bash

      # ------------------------------------------------------------
      # 13. 验证安装目录内容
      # ------------------------------------------------------------
      - name: 验证安装目录内容
        run: |
          echo "安装目录 /data/data/com.winlator/files/imagefs/usr 的内容："
          ls -la /data/data/com.winlator/files/imagefs/usr/
          if [ -d /data/data/com.winlator/files/imagefs/usr/bin ]; then
            echo "bin 目录内容："
            ls -la /data/data/com.winlator/files/imagefs/usr/bin/
          fi
          if [ -d /data/data/com.winlator/files/imagefs/usr/share ]; then
            echo "share 目录内容："
            ls -la /data/data/com.winlator/files/imagefs/usr/share/
          fi

      # ------------------------------------------------------------
      # 14. 打包
      # ------------------------------------------------------------
      - name: 准备打包
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          mkdir -p wine-package/$PACKAGE_NAME
          cp -r /data/data/com.winlator/files/imagefs/usr/* wine-package/$PACKAGE_NAME/

      - name: 创建打包文件
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          tar -cJf $PACKAGE_NAME.tar.xz -C wine-package $PACKAGE_NAME
          ls -lh *.tar.xz

      - name: Generate checksums
        run: |
          sha256sum *.tar.xz > checksums.txt
          cat checksums.txt

      - name: Upload Proton WoW64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Proton-${{ github.event.inputs.proton_branch || 'proton_10.0' }}-ARM64
          path: |
            *.tar.xz
            checksums.txt
          retention-days: 30

      - name: 发布 Proton 到 GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: proton-${{ github.event.inputs.proton_branch || 'proton_10.0' }}-arm64
          name: Proton ${{ github.event.inputs.proton_branch || 'proton_10.0' }} (ARM64 WOW64 for Termux)
          body: |
            # Proton ${{ github.event.inputs.proton_branch || 'proton_10.0' }} - ARM64 WOW64 for Termux

            ## 版本信息
            - **Proton 分支**: ${{ github.event.inputs.proton_branch || 'proton_10.0' }}
            - **主机架构**: ARM64 (aarch64)
            - **目标 Windows 架构**: i386, x86_64, arm64ec (通过 WOW64 模拟)
            - **平台**: Termux (Android)
            - **图形 API**: Vulkan 支持已启用
            - **多媒体**: GStreamer 支持已启用
            - **工具链**: llvm-mingw + 系统 gcc

            ## 特性
            ✓ ARM64 原生 Proton 可执行文件
            ✓ 支持运行 32/64 位 Windows 应用程序
            ✓ Vulkan 渲染
            ✓ GStreamer 多媒体后端
            ✓ 中文环境支持
            ✓ 应用了关键补丁提升兼容性
            ✓ 包含完整的运行时文件：wine.inf、wineboot、wineserver 等所有必要程序

            ## 安装说明
            解压后，将 `${{ env.BUILD_NAME }}` 文件夹放置在 Termux 的合适位置（建议 `/data/data/com.termux/files/usr/glibc`），并设置环境变量。

            ## 构建信息
            - 构建时间: ${{ github.event.head_commit.timestamp }}
            - 提交: ${{ github.sha }}
            - 工作流: ${{ github.workflow }}
          files: |
            ${{ github.workspace }}/${{ env.BUILD_NAME }}.tar.xz
            ${{ github.workspace }}/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}